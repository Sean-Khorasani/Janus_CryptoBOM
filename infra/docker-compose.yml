version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: janus-postgres
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus
      POSTGRES_DB: janus
    ports:
      - "5432:5432"
    volumes:
      - janus-postgres:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus -d janus"]
      interval: 5s
      timeout: 5s
      retries: 5

  janus-server:
    build:
      context: ../
      dockerfile: server/Dockerfile
    container_name: janus-server
    ports:
      - "8080:8080"
      - "9443:50051"
    environment:
      JANUS_DATABASE_URL: "postgres://janus:janus@postgres:5432/janus?sslmode=disable"
      JANUS_GRPC_ADDR: "0.0.0.0:50051"
      JANUS_HTTP_ADDR: "0.0.0.0:8080"
      JANUS_COMMAND_SIGNING_KEY: "change-me-in-production-32-byte-hex-key"
      JANUS_LOG_LEVEL: "info"
      JANUS_DB_MAX_CONNS: "25"
      JANUS_DB_MIN_CONNS: "5"
      JANUS_AGENT_STALL_SECONDS: "300"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  janus-agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    container_name: janus-agent
    volumes:
      - ./janus-agent.compose.toml:/data/janus-agent.toml:ro
      - janus-agent-data:/data
      - ../:/scan:ro
    depends_on:
      - janus-server
    restart: always

volumes:
  janus-postgres:
  janus-agent-data:
