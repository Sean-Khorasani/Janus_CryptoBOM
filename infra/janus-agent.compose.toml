controller_endpoint = "http://janus-server:9443"
execution_mode = "passive"
cache_path = "/data/agent.db"
host_uuid_path = "/data/janus-host-id"
report_path = "/data/janus-agent-report.html"
sarif_path = "/data/janus-agent.sarif"
scan_interval_seconds = 60
max_file_bytes = 2097152
max_binary_bytes = 16777216
command_signing_key = "local-development-command-signing-key"

scan_roots = ["/scan"]
exclude_dirs = [".git", "target", "node_modules", "dist", ".venv", "__pycache__"]
network_targets = ["janus-server:8080"]
plugin_dirs = []

[active]
allowed_services = ["nginx", "apache", "ssh"]
allowed_config_roots = ["/scan"]
backup_dir = "/data/.janus-backups"
