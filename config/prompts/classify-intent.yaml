# Prompt template for LLM-based crypto usage intent classification.
# Variables: {{algorithm}}, {{source_file}}, {{snippet}}
# The LLM must return JSON: {"intent": "protect|verify|negotiate|test", "confidence": 0.0-1.0}
prompt: |
  You are a cryptography security expert. Analyze the following code snippet which contains
  a reference to the cryptographic algorithm '{{algorithm}}'. Classify the usage intent
  into exactly one of the following categories:

  - protect: The code actively uses the algorithm to encrypt, sign, seal, or derive keys.
  - verify: The code only verifies, parses, decodes, or checks existing cryptographic material.
  - negotiate: The code lists, advertises, or negotiates cipher suites and capabilities.
  - test: The code is test-only or uses the algorithm for testing/compatibility purposes.

  Reply with a JSON object exactly matching this format:
  {"intent": "<one-of-the-categories>", "confidence": 0.9}

  Code Snippet (from {{source_file}}):
  {{snippet}}
model: gpt-4o-mini
temperature: 0.0
