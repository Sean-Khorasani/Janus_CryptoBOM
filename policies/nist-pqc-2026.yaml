metadata:
  version: "1.0.0"
  effective_date: "2026-01-01"
  authority: "NIST FIPS 203/204/205 + SP 800-131A Rev.3"
  review_cadence: "annually"
  status: "active"
  evidence_requirements:
    - "All findings must cite at least one Evidence record with confidence >= 0.6"
    - "COMPLIANT label requires absence of critical/high severity findings for 30 days"
    - "Assessments expire after 90 days without re-scan"

compliance_labeling:
  disclaimer: "Compliance labels are evidence-dependent assessments, not certifications"
  compliant_requires:
    no_critical_findings: true
    no_high_findings_for_days: 30
    last_scan_within_days: 90
    evidence_confidence_minimum: 0.6
  non_compliant_on:
    any_critical_finding: true
    scan_gap_days: 90
    evidence_below_threshold: true

version: nist-pqc-2026.1
minimum_rsa_key_bits: 3072
minimum_dh_safe_prime_bits: 3072
require_tls_13: true
require_hybrid_pq_tls_13: true
preferred_kem: X25519MLKEM768
preferred_signature: ML-DSA-65
minimum_confidence: 0.0
