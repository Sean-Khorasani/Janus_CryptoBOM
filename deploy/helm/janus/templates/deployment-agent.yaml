{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "janus-cryptobom.fullname" . }}-agent
  labels:
    app.kubernetes.io/name: {{ include "janus-cryptobom.name" . }}-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "janus-cryptobom.name" . }}-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "janus-cryptobom.name" . }}-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "janus-cryptobom.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      hostPID: {{ .Values.agent.hostPID }}
      containers:
        - name: agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
            privileged: false
          image: "{{ .Values.image.registry }}/{{ .Values.image.agent.repository }}:{{ .Values.image.agent.tag }}"
          imagePullPolicy: {{ .Values.image.agent.pullPolicy }}
          env:
            - name: JANUS_COMMAND_SIGNING_KEY_FILE
              value: /run/secrets/command-signing-key
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: host-fs
              mountPath: /host
              readOnly: true
            - name: agent-config
              mountPath: /data/janus-agent.toml
              subPath: agent.toml
              readOnly: true
            - name: agent-state
              mountPath: /data
            - name: command-signing-key
              mountPath: /run/secrets/command-signing-key
              subPath: commandSigningKey
              readOnly: true
      volumes:
        - name: host-fs
          hostPath:
            path: /
            type: Directory
        - name: agent-config
          configMap:
            name: {{ include "janus-cryptobom.fullname" . }}-config
        - name: agent-state
          emptyDir: {}
        - name: command-signing-key
          secret:
            secretName: {{ include "janus-cryptobom.fullname" . }}-secrets
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
