apiVersion: v1
kind: Secret
metadata:
  name: {{ include "janus-cryptobom.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "janus-cryptobom.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  commandSigningKey: {{ .Values.secrets.commandSigningKey | quote }}
  jwtSecret: {{ .Values.secrets.jwtSecret | quote }}
  hsmModulePath: {{ .Values.secrets.hsmModulePath | quote }}
  hsmPin: {{ .Values.secrets.hsmPin | quote }}
  hsmSlotId: {{ .Values.secrets.hsmSlotId | quote }}
  {{- if .Values.postgresql.enabled }}
  databaseUrl: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "janus-cryptobom.fullname" . }}-postgres:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
  {{- else }}
  databaseUrl: "postgres://{{ .Values.externalDatabase.username }}:{{ .Values.externalDatabase.password }}@{{ .Values.externalDatabase.host }}:{{ .Values.externalDatabase.port }}/{{ .Values.externalDatabase.database }}?sslmode={{ .Values.externalDatabase.sslmode }}"
  {{- end }}
