# Test data: Nginx configuration with TLS settings
# Used by: tests/scripts/test-migration.ps1

server {
    listen 443 ssl;
    server_name example.com;

    # JANUS-NET-002: TLS 1.2 only (not TLS 1.3)
    ssl_protocols TLSv1.2;

    # JANUS-PQC-005: Classical-only ciphers, no hybrid PQC
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    # JANUS-PQC-006: RSA certificate (classical signature)
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # JANUS-PQC-004: AES-128 preference over AES-256
    ssl_prefer_server_ciphers on;

    location / {
        root /var/www/html;
    }
}
