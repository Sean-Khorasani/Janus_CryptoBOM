controller_endpoint = "http://127.0.0.1:9443"
http_controller_endpoint = "http://127.0.0.1:8080"
execution_mode = "passive"
cache_path = "/var/lib/janus-agent/agent.db"
host_uuid_path = "/var/lib/janus-agent/host-id"
report_path = "/var/lib/janus-agent/report.html"
sarif_path = "/var/lib/janus-agent/report.sarif"
scan_interval_seconds = 900
max_file_bytes = 2097152
max_binary_bytes = 16777216
command_signing_key = ""

scan_roots = ["/opt", "/srv"]
exclude_dirs = [".git", "target", "node_modules", "dist", ".venv", "__pycache__"]
network_targets = []
enable_runtime_discovery = false
enable_process_memory_scraping = false
enable_plugin_discovery = false
enable_active_tls_probing = false
plugin_dirs = []
intercept_mode = "disabled"

[active]
allowed_services = []
allowed_config_roots = []
backup_dir = "/var/lib/janus-agent/backups"
