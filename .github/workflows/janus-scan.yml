name: Janus CryptoBOM CI Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC

jobs:
  crypto-scan:
    name: Cryptographic Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Janus CLI
        run: |
          curl -sSL https://github.com/janus-cbom/janus/releases/latest/download/janus-cli-linux-amd64 -o janus-cli
          chmod +x janus-cli
          sudo mv janus-cli /usr/local/bin/

      - name: Run Cryptographic Scan
        run: |
          janus-cli check . --format sarif --output janus-findings.sarif
        continue-on-error: true

      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: janus-findings.sarif
          category: janus-crypto-analysis

      - name: Generate CBOM
        run: |
          janus-cli check . --format cyclonedx --output janus-cbom.json

      - name: Upload CBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: janus-cbom
          path: janus-cbom.json

      - name: Compliance Gate
        run: |
          CRITICAL=$(jq '.runs[0].results | map(select(.level == "error")) | length' janus-findings.sarif)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::${CRITICAL} critical cryptographic findings detected"
            echo "## Janus Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Critical | ${CRITICAL} |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "::notice::No critical cryptographic findings — compliance gate passed"
