# Unit-test CI on both target OSes. Deliberately excludes the e2e suite and
# HSM tests — those need local PostgreSQL/SoftHSM2 (see commit 5ff505e); run
# scripts/test-e2e-windows.ps1 or make linux-gate locally for full validation.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Server unit tests
        working-directory: server
        run: go test ./...
      - name: Server race detector tests
        if: runner.os == 'Linux'
        working-directory: server
        continue-on-error: false
        run: go test -race -count=1 ./...
      - name: Agent unit tests (includes detection corpus precision/recall)
        working-directory: agent
        run: cargo test --locked
      - name: Detection corpus metrics
        if: runner.os == 'Windows'
        working-directory: agent
        run: cargo test --locked corpus_precision_recall -- --nocapture
