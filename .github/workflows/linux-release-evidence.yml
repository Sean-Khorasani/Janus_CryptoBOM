name: Linux Release Evidence

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "22.x"
  RUST_VERSION: "1.96.0"
  SYFT_VERSION: "v1.27.1"

jobs:
  linux-gate-l0:
    name: Require Linux Gate L0
    uses: ./.github/workflows/linux-ci.yml

  release-evidence:
    name: Release evidence / ubuntu-24.04-x86_64 / supported
    needs: linux-gate-l0
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize release evidence identifier
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME//[^A-Za-z0-9._-]/-}"
          printf 'RELEASE_VERSION=%s\n' "$release_version" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install pinned Rust toolchain
        run: rustup toolchain install "$RUST_VERSION" --profile minimal
      - name: Build supported Linux release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/stage/{agent,server,ui} release/evidence
          (
            cd server
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -mod=readonly -trimpath \
              -ldflags="-s -w -X main.version=${RELEASE_VERSION}" \
              -o ../release/stage/server/janus-server ./cmd/janus-server
          )
          (
            cd agent
            cargo build --locked --release
            install -m 0755 target/release/janus-agent ../release/stage/agent/janus-agent
          )
          (
            cd ui
            npm ci
            npm run build
            cp -R dist/. ../release/stage/ui/
          )
          cp agent/janus-agent.linux.toml release/stage/agent/
          cp packaging/systemd/janus-agent.service packaging/systemd/janus-agent.tmpfiles \
            release/stage/agent/
          cp -R policies release/stage/server/
      - name: Include Linux Gate L0 logs and test results
        uses: actions/download-artifact@v4
        with:
          path: release/evidence/ci
      - name: Create reproducible archives and provenance manifest
        shell: bash
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          for component in agent server ui; do
            tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 \
              --numeric-owner -C release/stage -czf \
              "release/janus-${component}-${RELEASE_VERSION}-linux-x86_64.tar.gz" \
              "$component"
          done
          bash scripts/ci/collect-linux-evidence.sh release/evidence release/*.tar.gz
      - name: Generate SPDX JSON SBOMs with pinned Syft
        shell: bash
        run: |
          set -euo pipefail
          for component in agent server ui; do
            docker run --rm -v "$PWD:/work" "anchore/syft:${SYFT_VERSION}" \
              "dir:/work/release/stage/${component}" \
              -o "spdx-json=/work/release/evidence/${component}.spdx.json"
          done
          (
            cd release
            sha256sum *.tar.gz
            find evidence -type f -print0 | sort -z | xargs -0 sha256sum
          ) > release/SHA256SUMS
      - name: Install cosign for tag signing
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3.9.2
      - name: Keyless-sign tag release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          for artifact in release/*.tar.gz release/evidence/*.spdx.json release/SHA256SUMS; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          done
          printf '%s\n' \
            "signed=true" \
            "signing=Sigstore keyless OIDC" \
            "workflow=${GITHUB_WORKFLOW}" \
            "ref=${GITHUB_REF}" > release/SIGNING_STATUS.txt
      - name: Record unsigned release-candidate status
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          printf '%s\n' \
            "signed=false" \
            "reason=manual workflow_dispatch runs are release-candidate evidence only" \
            "ref=${GITHUB_REF}" > release/SIGNING_STATUS.txt
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-evidence-${{ github.run_id }}-${{ github.sha }}
          path: |
            release/*.tar.gz
            release/*.json
            release/SHA256SUMS
            release/SIGNING_STATUS.txt
            release/evidence/
          if-no-files-found: error
          retention-days: 30
